<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Annai Mira AR Roadmap</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }

  /* ── SCANNER stays fullscreen ── */
  a-scene { width: 100vw; height: 100vh; }

  /* ── "Open Video" button that appears on scan ── */
  #open-btn {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    background: linear-gradient(135deg, #6c3fc5, #a855f7);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    padding: 16px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(108,63,197,0.6);
    animation: pulse 1.5s infinite;
    letter-spacing: 1px;
  }
  #open-btn.visible { display: block; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(108,63,197,0.6); }
    50%      { box-shadow: 0 4px 35px rgba(108,63,197,1); }
  }

  /* ── Dept label badge on screen ── */
  #dept-label {
    display: none;
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 15px;
    padding: 8px 22px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(6px);
  }
  #dept-label.visible { display: block; }

  /* ── Fullscreen Video Player Overlay ── */
  #video-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #video-overlay.visible { display: flex; }

  #video-overlay video {
    width: 100%;
    max-height: 80vh;
    object-fit: contain;
    background: #000;
  }

  /* Controls bar */
  .player-controls {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #111;
    gap: 12px;
  }
  .dept-title {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    flex: 1;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 18px;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
  }
  .ctrl-btn.close-btn {
    background: #e53e3e;
    border-color: #e53e3e;
    font-weight: bold;
  }
  .ctrl-btn.mute-btn { font-size: 18px; }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    padding: 0 16px 10px;
    background: #111;
  }
  .progress-wrap input[type=range] {
    width: 100%;
    accent-color: #a855f7;
    cursor: pointer;
  }

  /* Scanning hint */
  #scan-hint {
    position: fixed;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 998;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    text-align: center;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
</style>
</head>

<body>

<!-- Hidden preloaded videos (outside a-scene for mobile autoplay reliability) -->
<video id="vid-it"  src="./it.mp4"  loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-ai"  src="./ai.mp4"  loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-cse" src="./cse.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-eee" src="./eee.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-ece" src="./ece.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-mba" src="./mba.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>

<!-- AR Scene — NO a-video inside entities, scanner only shows a flat plane icon -->
<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.01;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="alpha: true; antialias: true"
  embedded>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Each target shows a small animated ring — NOT the video -->
  <!-- IT -->
  <a-entity mindar-image-target="targetIndex: 0" id="target-it">
    <a-ring color="#ff4ecd" radius-inner="0.15" radius-outer="0.2"
      position="0 0 0" rotation="-90 0 0"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 2000; easing: linear">
    </a-ring>
    <a-text value="IT" align="center" color="#fff" width="2" position="0 0 0.01"></a-text>
  </a-entity>

  <!-- AI -->
  <a-entity mindar-image-target="targetIndex: 1" id="target-ai">
    <a-ring color="#f97316" radius-inner="0.15" radius-outer="0.2"
      position="0 0 0" rotation="-90 0 0"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 2000; easing: linear">
    </a-ring>
    <a-text value="AI" align="center" color="#fff" width="2" position="0 0 0.01"></a-text>
  </a-entity>

  <!-- CSE -->
  <a-entity mindar-image-target="targetIndex: 2" id="target-cse">
    <a-ring color="#7c3aed" radius-inner="0.15" radius-outer="0.2"
      position="0 0 0" rotation="-90 0 0"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 2000; easing: linear">
    </a-ring>
    <a-text value="CSE" align="center" color="#fff" width="2" position="0 0 0.01"></a-text>
  </a-entity>

  <!-- EEE -->
  <a-entity mindar-image-target="targetIndex: 3" id="target-eee">
    <a-ring color="#10b981" radius-inner="0.15" radius-outer="0.2"
      position="0 0 0" rotation="-90 0 0"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 2000; easing: linear">
    </a-ring>
    <a-text value="EEE" align="center" color="#fff" width="2" position="0 0 0.01"></a-text>
  </a-entity>

  <!-- ECE -->
  <a-entity mindar-image-target="targetIndex: 4" id="target-ece">
    <a-ring color="#ef4444" radius-inner="0.15" radius-outer="0.2"
      position="0 0 0" rotation="-90 0 0"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 2000; easing: linear">
    </a-ring>
    <a-text value="ECE" align="center" color="#fff" width="2" position="0 0 0.01"></a-text>
  </a-entity>

  <!-- MBA -->
  <a-entity mindar-image-target="targetIndex: 5" id="target-mba">
    <a-ring color="#3b82f6" radius-inner="0.15" radius-outer="0.2"
      position="0 0 0" rotation="-90 0 0"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 2000; easing: linear">
    </a-ring>
    <a-text value="MBA" align="center" color="#fff" width="2" position="0 0 0.01"></a-text>
  </a-entity>

</a-scene>

<!-- Scan hint -->
<div id="scan-hint">📷 Point camera at a department logo</div>

<!-- Department label (shows on detection) -->
<div id="dept-label"></div>

<!-- Open Video Button -->
<button id="open-btn" onclick="openVideoPlayer()">▶ Open Video</button>

<!-- ── Fullscreen Video Player ── -->
<div id="video-overlay">
  <video id="player-video" controls playsinline webkit-playsinline
    style="width:100%; max-height:80vh; background:#000; object-fit:contain;">
  </video>
  <div class="progress-wrap">
    <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1"
      oninput="seekVideo(this.value)">
  </div>
  <div class="player-controls">
    <div class="dept-title" id="player-title">Department Video</div>
    <button class="ctrl-btn mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
    <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
    <button class="ctrl-btn close-btn" onclick="closeVideoPlayer()">✕ Close</button>
  </div>
</div>

<script>
// ── Config: map target IDs to video IDs and dept names ──
const TARGETS = [
  { id: "target-it",  vid: "vid-it",  name: "Information Technology" },
  { id: "target-ai",  vid: "vid-ai",  name: "Artificial Intelligence" },
  { id: "target-cse", vid: "vid-cse", name: "Computer Science Engineering" },
  { id: "target-eee", vid: "vid-eee", name: "Electrical & Electronics Engg." },
  { id: "target-ece", vid: "vid-ece", name: "Electronics & Communication Engg." },
  { id: "target-mba", vid: "vid-mba", name: "Master of Business Administration" },
];

let currentVidId  = null;
let currentName   = "";
let isMuted       = false;

const openBtn    = document.getElementById("open-btn");
const deptLabel  = document.getElementById("dept-label");
const scanHint   = document.getElementById("scan-hint");

// ── Register AR target events ──
TARGETS.forEach(({ id, vid, name }) => {
  const el = document.getElementById(id);
  if (!el) return;

  el.addEventListener("targetFound", () => {
    console.log("Detected:", name);
    currentVidId = vid;
    currentName  = name;

    deptLabel.textContent = "🎓 " + name;
    deptLabel.classList.add("visible");
    openBtn.classList.add("visible");
    scanHint.style.display = "none";
  });

  el.addEventListener("targetLost", () => {
    // Don't hide the button immediately — give user time to tap
    // Hide only after 4 seconds if no other target found
    setTimeout(() => {
      if (currentVidId === vid) {
        openBtn.classList.remove("visible");
        deptLabel.classList.remove("visible");
        scanHint.style.display = "block";
        currentVidId = null;
      }
    }, 4000);
  });
});

// ── Open the fullscreen video player ──
function openVideoPlayer() {
  if (!currentVidId) return;

  const srcVideo = document.getElementById(currentVidId);
  const player   = document.getElementById("player-video");
  const overlay  = document.getElementById("video-overlay");
  const title    = document.getElementById("player-title");

  // Set src from the preloaded hidden video
  player.src = srcVideo.src;
  player.muted = false; // Unmute in player — user has already interacted
  title.textContent = currentName;

  overlay.classList.add("visible");
  player.currentTime = 0;
  player.play().catch(e => console.warn("Player play error:", e));

  // Progress bar sync
  player.addEventListener("timeupdate", syncProgress);
}

function syncProgress() {
  const player = document.getElementById("player-video");
  const bar    = document.getElementById("progress-bar");
  if (player.duration) {
    bar.value = (player.currentTime / player.duration) * 100;
  }
}

function seekVideo(val) {
  const player = document.getElementById("player-video");
  if (player.duration) {
    player.currentTime = (val / 100) * player.duration;
  }
}

function toggleMute() {
  const player  = document.getElementById("player-video");
  const muteBtn = document.getElementById("mute-btn");
  isMuted = !isMuted;
  player.muted = isMuted;
  muteBtn.textContent = isMuted ? "🔇" : "🔊";
}

function toggleFullscreen() {
  const overlay = document.getElementById("video-overlay");
  if (!document.fullscreenElement) {
    overlay.requestFullscreen && overlay.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

function closeVideoPlayer() {
  const player  = document.getElementById("player-video");
  const overlay = document.getElementById("video-overlay");
  player.pause();
  player.removeEventListener("timeupdate", syncProgress);
  overlay.classList.remove("visible");
}
</script>
</body>
</html>
