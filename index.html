<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Annai Mira AR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #f5c842;
      --dark: #0a0a0f;
      --card: #12121a;
      --text: #f0eee8;
      --muted: rgba(240, 238, 232, 0.45)
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--text);
      font-family: 'Outfit', sans-serif
    }

    /* ── PAGE SYSTEM ── */
    .page {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      transition: opacity 0.4s, transform 0.4s;
      z-index: 1
    }

    .page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
      z-index: -1
    }

    .page.active {
      opacity: 1;
      pointer-events: all;
      transform: scale(1);
      z-index: 10
    }


    /* ── HOME ── */
    #page-home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      position: relative
    }

    #page-home::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(240, 180, 41, .045) 1px, transparent 1px), linear-gradient(90deg, rgba(240, 180, 41, .045) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0
    }

    #page-home::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 260px;
      background: radial-gradient(ellipse 55% 45% at 50% 30%, rgba(240, 180, 41, .18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    .home-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      width: 100%;
      max-width: 400px
    }

    .logo-badge {
      position: relative;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      animation: badgePop .7s cubic-bezier(.34, 1.56, .64, 1) both;
      overflow: visible;
      background: transparent
    }

    .logo-badge::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240, 180, 41, .22) 0%, transparent 70%);
      animation: breathe 3s ease-in-out infinite;
      pointer-events: none
    }

    .logo-badge::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid rgba(240, 180, 41, .7);
      box-shadow: 0 0 18px rgba(240, 180, 41, .35), inset 0 0 12px rgba(240, 180, 41, .1)
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: .7
      }

      50% {
        transform: scale(1.06);
        opacity: 1
      }
    }

    @keyframes badgePop {
      from {
        opacity: 0;
        transform: scale(.5)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .logo-badge img {
      width: 148px;
      height: 148px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      background: #1a1208;
      position: relative;
      z-index: 1
    }

    .home-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 14vw, 88px);
      letter-spacing: .06em;
      text-align: center;
      line-height: .95;
      color: #f0b429;
      text-shadow: 0 0 60px rgba(240, 180, 41, .25);
      animation: slideUp .6s .1s both
    }

    .home-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(14px, 4vw, 20px);
      font-weight: 600;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: #fff;
      margin-top: 6px;
      text-align: center;
      animation: slideUp .6s .2s both
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .tagline {
      margin: 18px 0 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, .55);
      text-align: center;
      line-height: 1.7;
      animation: slideUp .6s .3s both
    }

    .dept-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
      animation: slideUp .6s .4s both
    }

    .pill {
      padding: 7px 18px;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid;
      transition: transform .18s, filter .18s;
      -webkit-tap-highlight-color: transparent
    }

    .pill:active {
      transform: scale(.94)
    }

    .pill:hover {
      filter: brightness(1.2);
      transform: translateY(-2px)
    }

    .pill-it {
      color: #c084fc;
      border-color: #7c3aed;
      background: rgba(124, 58, 237, .15)
    }

    .pill-ai {
      color: #fb923c;
      border-color: #ea580c;
      background: rgba(234, 88, 12, .15)
    }

    .pill-cse {
      color: #818cf8;
      border-color: #4338ca;
      background: rgba(67, 56, 202, .15)
    }

    .pill-eee {
      color: #34d399;
      border-color: #059669;
      background: rgba(5, 150, 105, .15)
    }

    .pill-ece {
      color: #f87171;
      border-color: #dc2626;
      background: rgba(220, 38, 38, .15)
    }

    .pill-mba {
      color: #67e8f9;
      border-color: #0891b2;
      background: rgba(8, 145, 178, .15)
    }

    .start-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: min(340px, 88vw);
      height: 62px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: .2em;
      color: #111;
      background: linear-gradient(135deg, #f0b429 0%, #ffd060 45%, #e8a020 100%);
      box-shadow: 0 4px 32px rgba(240, 180, 41, .35), 0 0 0 0 rgba(240, 180, 41, .4);
      animation: slideUp .6s .5s both, btnPulse 2.8s ease-in-out infinite;
      transition: transform .15s;
      -webkit-tap-highlight-color: transparent
    }

    @keyframes btnPulse {

      0%,
      100% {
        box-shadow: 0 4px 32px rgba(240, 180, 41, .35), 0 0 0 0 rgba(240, 180, 41, .35)
      }

      50% {
        box-shadow: 0 4px 40px rgba(240, 180, 41, .55), 0 0 0 10px rgba(240, 180, 41, 0)
      }
    }

    .start-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .28), transparent);
      animation: sweep 3s ease-in-out infinite
    }

    @keyframes sweep {
      0% {
        left: -100%
      }

      40% {
        left: 120%
      }

      100% {
        left: 120%
      }
    }

    .start-btn:active {
      transform: scale(.96)
    }

    .play-tri {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 7px 0 7px 13px;
      border-color: transparent transparent transparent #111;
      flex-shrink: 0
    }

    .home-footer {
      margin-top: 22px;
      font-size: 11px;
      color: rgba(255, 255, 255, .38);
      text-align: center;
      letter-spacing: .04em;
      animation: slideUp .6s .6s both
    }

    .home-footer a {
      color: #f0b429;
      text-decoration: none;
      font-weight: 500
    }

    /* ── SCANNER ── */
    #page-scanner {
      background: #000
    }

    #ar-mount {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%
    }

    #ar-mount a-scene {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important
    }

    /* Fix camera feed to fill screen like real camera on Android & iOS */
    #ar-mount canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      display: block !important
    }

    #ar-mount video:not(#overlay-video):not([id^="ar-vid-"]) {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important
    }

    .scanner-topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 14px) 16px 12px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, .65), transparent)
    }

    .scanner-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--gold)
    }

    .back-btn {
      background: rgba(0, 0, 0, .45);
      border: 1px solid rgba(255, 255, 255, .2);
      color: #fff;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px)
    }

    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: min(70vw, 250px);
      height: min(70vw, 250px);
      pointer-events: none;
      z-index: 400
    }

    .scan-frame::before,
    .scan-frame::after,
    .corner-br,
    .corner-bl {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid
    }

    .scan-frame::before {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0
    }

    .scan-frame::after {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
      border-radius: 0 4px 0 0
    }

    .corner-br {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0
    }

    .corner-bl {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
      border-radius: 0 0 0 4px
    }

    .scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scanAnim 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--gold)
    }

    @keyframes scanAnim {

      0%,
      100% {
        top: 4px
      }

      50% {
        top: calc(100% - 6px)
      }
    }

    .scan-hint {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      text-align: center;
      color: rgba(255, 255, 255, .72);
      font-size: 13px;
      pointer-events: none;
      background: rgba(0, 0, 0, .5);
      padding: 8px 18px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap
    }

    .dept-badge {
      position: absolute;
      top: 75px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 500;
      opacity: 0;
      transition: opacity .35s, transform .35s;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, .6);
      border: 1px solid rgba(255, 255, 255, .15);
      padding: 9px 20px;
      border-radius: 30px;
      backdrop-filter: blur(10px)
    }

    .dept-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    .dept-badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .dept-badge-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap
    }

    /* overlay preview panel */
    .ar-overlay-panel {
      position: absolute;
      left: 50%;
      bottom: 160px;
      transform: translateX(-50%) scale(.9) translateY(10px);
      z-index: 600;
      width: min(90vw, 320px);
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .8);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s, transform .4s;
      border: 1px solid rgba(255, 255, 255, .1)
    }

    .ar-overlay-panel.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) scale(1) translateY(0)
    }

    #overlay-video {
      width: 100%;
      display: block;
      max-height: 130px;
      object-fit: cover;
      background: #000
    }

    .ar-overlay-label {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, .7);
      background: rgba(0, 0, 0, .7);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .ar-live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: livePulse 1s infinite
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .open-video-btn {
      position: absolute;
      bottom: 82px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      z-index: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s .15s, transform .4s .15s;
      background: linear-gradient(135deg, #f5c842, #f0a500);
      color: #0a0a0f;
      border: none;
      border-radius: 50px;
      padding: 15px 44px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(245, 200, 66, .5)
    }

    .open-video-btn.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0)
    }

    .open-video-btn:active {
      transform: translateX(-50%) scale(.95) !important
    }

    /* ── VIDEO PLAYER ── */
    #video-player-page {
      background: #000;
      display: flex;
      flex-direction: column
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: env(safe-area-inset-top, 16px) 16px 14px;
      background: #111;
      flex-shrink: 0
    }

    .player-back {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .1);
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .player-back:active {
      background: rgba(255, 255, 255, .25)
    }

    .player-dept-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--gold)
    }

    .main-video-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      overflow: hidden;
      min-height: 0
    }

    #main-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block
    }

    .tap-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .25);
      cursor: pointer;
      z-index: 3;
      transition: opacity .3s
    }

    .tap-play-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(245, 200, 66, .92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #000;
      box-shadow: 0 0 30px rgba(245, 200, 66, .5);
      transition: transform .2s
    }

    .tap-play:active .tap-play-icon {
      transform: scale(.9)
    }

    .tap-play.hidden {
      opacity: 0;
      pointer-events: none
    }

    .player-controls-wrap {
      background: linear-gradient(to top, #0a0a0f, rgba(16, 16, 22, .98));
      padding: 12px 16px calc(env(safe-area-inset-bottom, 10px) + 12px);
      flex-shrink: 0
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px
    }

    .time-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 38px
    }

    .time-label.right {
      text-align: right
    }

    #prog {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, .18);
      border-radius: 4px;
      cursor: pointer;
      outline: none
    }

    #prog::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(245, 200, 66, .5)
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px
    }

    .ctrl-icon {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      color: #fff;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s
    }

    .ctrl-icon:active {
      background: rgba(255, 255, 255, .2)
    }

    .ctrl-play {
      width: 58px;
      height: 58px;
      font-size: 22px;
      background: var(--gold);
      color: #000;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(245, 200, 66, .4);
      transition: transform .15s;
      flex-shrink: 0
    }

    .ctrl-play:active {
      transform: scale(.92)
    }

    .speed-pill {
      background: rgba(245, 200, 66, .14);
      border: 1px solid rgba(245, 200, 66, .3);
      color: var(--gold);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer
    }
  </style>
</head>

<body>

  <!-- ════════ PAGE 1: HOME ════════ -->
  <div id="page-home" class="page active">
    <div class="home-inner">
      <div class="logo-badge">
        <img id="college-logo" src="" alt="Annai Mira College Logo">
      </div>
      <h1 class="home-title">Annai Mira</h1>
      <p class="home-sub">AR &nbsp;Roadmap</p>
      <div class="tagline">
        முயற்சி · பயிற்சி · உழைப்பு<br>
        <span style="font-size:12px;opacity:.7">Point your camera at a department logo<br>to explore your career path in
          AR</span>
      </div>
      <div class="dept-pills">
        <span class="pill pill-mba">Main Gate</span>
        <span class="pill pill-it">Kamaraj Block</span>
        <span class="pill pill-cse">T. Periyar Block</span>
      </div>
      <button class="start-btn" onclick="goToScanner()">
        <span class="play-tri"></span>
        Start Scanning
      </button>
      <div class="home-footer">
        Annai Mira College of Engg. &amp; Tech. &nbsp;·&nbsp;
        <a href="https://amcet.in" target="_blank">amcet.in</a>
      </div>
    </div>
  </div>

  <!-- ════════ PAGE 2: SCANNER ════════ -->
  <div id="page-scanner" class="page hidden">
    <div class="scanner-topbar">
      <span class="scanner-logo">ANNAI MIRA AR</span>
      <button class="back-btn" onclick="goHome()">✕ Exit</button>
    </div>
    <div id="ar-mount"></div>
    <div class="scan-frame">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <div class="scan-line"></div>
    </div>
    <div class="dept-badge" id="dept-badge">
      <div class="dept-badge-dot" id="badge-dot"></div>
      <div class="dept-badge-name" id="badge-name"></div>
    </div>
    <div class="ar-overlay-panel" id="overlay-panel">
      <!-- overlay video removed: play only via OPEN VIDEO button -->
      <div class="ar-overlay-label">
        <div class="ar-live-dot"></div>
        <span id="overlay-label">Preview</span>
      </div>
    </div>
    <button class="open-video-btn" id="open-video-btn" onclick="openFullPlayer()">
      ▶&nbsp; OPEN VIDEO
    </button>
    <div class="scan-hint" id="scan-hint">📷 Point at a department logo</div>

    // ══════════ CONFIG ══════════
    const TARGETS = [
      { idx: 0, id: 'target-maingate', src: 'block2.mp4', name: 'Main Gate', color: '#f5c842' },
      { idx: 1, id: 'target-kamaraj', src: 'main.mp4', name: 'Kamaraj Block', color: '#ff4ecd' },
      { idx: 2, id: 'target-tperiyar', src: 'block1.mp4', name: 'Thanthai Periyar Block', color: '#a78bfa' },
    ];

    let currentTarget = null, hideTimeout = null, isSeeking = false, isMuted = false, arReady = false;
    const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2]; let speedIdx = 2;

    // ══════════ PAGES ══════════
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.classList.add('hidden') });
      const p = document.getElementById(id);
      p.classList.remove('hidden');
      requestAnimationFrame(() => requestAnimationFrame(() => p.classList.add('active')));
    }
    function goHome() { pauseOverlay(); showPage('page-home') }
    function goToScanner() { showPage('page-scanner'); if (!arReady) { buildARScene(); arReady = true } }

    // Back button — works reliably via addEventListener
    // Back button — capture phase ensures it fires before any other handler
    document.getElementById('player-back-btn').addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation(); closeFullPlayer();
    }, { capture: true, passive: false });
    document.getElementById('player-back-btn').addEventListener('touchend', function (e) {
      e.preventDefault(); e.stopPropagation(); closeFullPlayer();
    }, { capture: true, passive: false });

    // ══════════ AR ══════════
    function buildARScene() {
      const mount = document.getElementById('ar-mount');
      const assets = TARGETS.map(t => `<video id="ar-${t.id}" src="./${t.src}" loop muted playsinline preload="auto" webkit-playsinline></video>`).join('');
      const entities = TARGETS.map(t =>
        `<a-entity mindar-image-target="targetIndex:${t.idx}" id="${t.id}">
       <a-video src="#ar-${t.id}" position="0 0 0.01" width="1.6" height="0.9" material="shader:flat;side:double"></a-video>
     </a-entity>`).join('');
      mount.innerHTML = `
    <a-scene mindar-image="imageTargetSrc:./targets.mind;filterMinCF:0.0001;filterBeta:0.01;"
      vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false"
      renderer="alpha:true;antialias:false;" embedded
      style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;">
      <a-assets>${assets}</a-assets>
      <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
      ${entities}
    </a-scene>`;
      mount.querySelector('a-scene').addEventListener('loaded', attachAREvents);
    }

    function attachAREvents() {
      TARGETS.forEach(t => {
        const el = document.getElementById(t.id);
        if (!el) return;
        el.addEventListener('targetFound', () => {
          currentTarget = t; clearTimeout(hideTimeout);
          document.getElementById('badge-dot').style.background = t.color;
          document.getElementById('badge-name').textContent = t.name;
          document.getElementById('dept-badge').classList.add('visible');
          document.getElementById('scan-hint').style.display = 'none';
          const arv = document.getElementById(`ar-${t.id}`);
          if (arv) { arv.currentTime = 0; arv.play().catch(() => { }) }
          // Show overlay panel as static thumbnail — do NOT autoplay
          // Only show the OPEN VIDEO button; actual playback in full player
          document.getElementById('overlay-label').textContent = t.name;
          document.getElementById('overlay-panel').classList.add('visible');
          document.getElementById('open-video-btn').classList.add('visible');
        });
        el.addEventListener('targetLost', () => {
          const arv = document.getElementById(`ar-${t.id}`);
          if (arv) arv.pause();
          clearTimeout(hideTimeout);
          hideTimeout = setTimeout(() => {
            if (currentTarget && currentTarget.id === t.id) {
              document.getElementById('dept-badge').classList.remove('visible');
              document.getElementById('overlay-panel').classList.remove('visible');
              document.getElementById('open-video-btn').classList.remove('visible');
              pauseOverlay();
              document.getElementById('scan-hint').style.display = '';
              currentTarget = null;
            }
          }, 4500);
        });
      });
    }

    function pauseOverlay() {/* overlay video not used */ }

    // ══════════ VIDEO PLAYER ══════════
    function openFullPlayer() {
      if (!currentTarget) return;
      const p = document.getElementById('main-player');
      p.src = './' + currentTarget.src;
      p.muted = false; p.playbackRate = speeds[speedIdx];
      document.getElementById('player-dept-name').textContent = currentTarget.name;
      document.getElementById('tap-play').classList.remove('hidden');
      document.getElementById('play-icon').textContent = '▶';
      document.getElementById('ctrl-play-btn').textContent = '▶';
      document.getElementById('prog').value = 0;
      document.getElementById('cur-time').textContent = '0:00';
      document.getElementById('dur-time').textContent = '0:00';

      // Scanner page is hidden by showPage() — nothing to hide here
      // (all scanner elements are position:absolute inside scanner page)

      showPage('video-player-page');
      p.addEventListener('timeupdate', onTimeUpdate);
      p.addEventListener('loadedmetadata', () => { document.getElementById('dur-time').textContent = fmtTime(p.duration) });
      p.addEventListener('ended', () => {
        document.getElementById('tap-play').classList.remove('hidden');
        document.getElementById('play-icon').textContent = '▶';
        document.getElementById('ctrl-play-btn').textContent = '▶';
      });
      p.play().then(() => {
        document.getElementById('tap-play').classList.add('hidden');
        document.getElementById('play-icon').textContent = '⏸';
        document.getElementById('ctrl-play-btn').textContent = '⏸';
      }).catch(() => { });
    }

    function closeFullPlayer() {
      const p = document.getElementById('main-player');
      p.pause(); p.src = '';
      p.removeEventListener('timeupdate', onTimeUpdate);
      // Scanner page restores itself when shown — nothing extra needed
      showPage('page-scanner');
    }

    function togglePlay() {
      const p = document.getElementById('main-player');
      const btn = document.getElementById('ctrl-play-btn');
      const icon = document.getElementById('play-icon');
      const tp = document.getElementById('tap-play');
      if (p.paused) { p.play(); btn.textContent = '⏸'; icon.textContent = '⏸'; tp.classList.add('hidden') }
      else { p.pause(); btn.textContent = '▶'; icon.textContent = '▶'; tp.classList.remove('hidden') }
    }
    function skipBy(sec) { const p = document.getElementById('main-player'); p.currentTime = Math.max(0, Math.min(p.duration || 0, p.currentTime + sec)) }
    function toggleMute() { isMuted = !isMuted; document.getElementById('main-player').muted = isMuted; document.getElementById('mute-ico').textContent = isMuted ? '🔇' : '🔊' }
    function seekTo(val) { const p = document.getElementById('main-player'); if (p.duration) p.currentTime = (val / 100) * p.duration }
    function cycleSpeed() { speedIdx = (speedIdx + 1) % speeds.length; const s = speeds[speedIdx]; document.getElementById('main-player').playbackRate = s; document.getElementById('speed-pill').textContent = s + '×' }
    function onTimeUpdate() {
      if (isSeeking) return;
      const p = document.getElementById('main-player');
      if (!p.duration) return;
      document.getElementById('prog').value = (p.currentTime / p.duration) * 100;
      document.getElementById('cur-time').textContent = fmtTime(p.currentTime);
    }
    function fmtTime(s) { if (!s || isNaN(s)) return '0:00'; return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0') }
    document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  </script>
