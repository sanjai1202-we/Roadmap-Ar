<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Annai Mira AR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #f5c842;
  --dark: #0a0a0f;
  --card: #12121a;
  --border: rgba(245,200,66,0.18);
  --text: #f0eee8;
  --muted: rgba(240,238,232,0.45);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--dark); color:var(--text); font-family:'Outfit',sans-serif; }

.page { position:fixed; inset:0; width:100%; height:100%; transition:opacity 0.45s ease, transform 0.45s ease; }
.page.hidden { opacity:0; pointer-events:none; transform:scale(0.97); }
.page.active { opacity:1; pointer-events:all; transform:scale(1); }

/* ══ HOME PAGE ══ */
#page-home {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--dark); overflow:hidden;
}
#page-home::before {
  content:''; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(245,200,66,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,200,66,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridScroll 20s linear infinite;
}
@keyframes gridScroll { from{background-position:0 0} to{background-position:40px 40px} }
#page-home::after {
  content:''; position:absolute;
  width:70vw; height:70vw; max-width:360px; max-height:360px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(245,200,66,0.12) 0%, transparent 70%);
  top:5%; left:50%; transform:translateX(-50%);
  animation:breathe 4s ease-in-out infinite; pointer-events:none;
}
@keyframes breathe { 0%,100%{transform:translateX(-50%) scale(1);opacity:0.7} 50%{transform:translateX(-50%) scale(1.15);opacity:1} }

.home-inner { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; padding:24px; width:100%; max-width:400px; }

.logo-badge {
  width:92px; height:92px; border-radius:50%;
  background:var(--card); border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:24px;
  box-shadow:0 0 30px rgba(245,200,66,0.25);
  animation:badgePop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  overflow:hidden;
}
@keyframes badgePop { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
.logo-badge img { width:80px; height:80px; object-fit:contain; border-radius:50%; }
.logo-fallback { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--gold); letter-spacing:2px; }

.home-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(50px,13vw,72px); letter-spacing:3px; text-align:center; line-height:1; color:var(--gold); text-shadow:0 0 40px rgba(245,200,66,0.4); animation:slideUp 0.6s 0.1s both; }
.home-sub { font-family:'Bebas Neue',sans-serif; font-size:clamp(20px,5vw,28px); letter-spacing:7px; color:var(--text); margin-top:4px; text-align:center; animation:slideUp 0.6s 0.2s both; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.tagline { margin:18px 0 30px; font-size:13px; color:var(--muted); text-align:center; letter-spacing:0.5px; line-height:1.7; animation:slideUp 0.6s 0.3s both; }

.dept-pills { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:36px; animation:slideUp 0.6s 0.4s both; }
.pill { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1.5px; border:1px solid; backdrop-filter:blur(4px); }
.pill-it  { color:#ff4ecd; border-color:rgba(255,78,205,0.4); background:rgba(255,78,205,0.08); }
.pill-ai  { color:#f97316; border-color:rgba(249,115,22,0.4); background:rgba(249,115,22,0.08); }
.pill-cse { color:#a78bfa; border-color:rgba(167,139,250,0.4); background:rgba(167,139,250,0.08); }
.pill-eee { color:#10b981; border-color:rgba(16,185,129,0.4); background:rgba(16,185,129,0.08); }
.pill-ece { color:#ef4444; border-color:rgba(239,68,68,0.4); background:rgba(239,68,68,0.08); }
.pill-mba { color:#3b82f6; border-color:rgba(59,130,246,0.4); background:rgba(59,130,246,0.08); }

.start-btn {
  position:relative; overflow:hidden;
  width:100%; max-width:300px; padding:18px 0;
  border:none; border-radius:50px; cursor:pointer;
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px;
  color:var(--dark); background:linear-gradient(135deg,#f5c842,#f0a500);
  box-shadow:0 6px 30px rgba(245,200,66,0.45);
  animation:slideUp 0.6s 0.5s both;
  transition:transform 0.15s, box-shadow 0.15s;
}
.start-btn:active { transform:scale(0.96); box-shadow:0 3px 15px rgba(245,200,66,0.3); }
.start-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.22),transparent); border-radius:50px; }
.start-btn span { position:relative; z-index:1; }
.home-footer { margin-top:26px; font-size:11px; color:var(--muted); text-align:center; animation:slideUp 0.6s 0.6s both; }
.home-footer a { color:var(--gold); text-decoration:none; }

/* ══ SCANNER PAGE ══ */
#page-scanner { background:#000; }

/* CRITICAL: prevent iOS zoom and Android camera issues */
#page-scanner a-scene {
  position:absolute !important; top:0 !important; left:0 !important;
  width:100% !important; height:100% !important;
}
/* Force the internal AR video/canvas to never zoom or overflow */
#page-scanner canvas { 
  width:100% !important; height:100% !important;
  object-fit:cover !important;
  max-width:100vw !important; max-height:100vh !important;
  display:block !important;
}
/* The AR library places a video element for camera — force it to fill like a real camera */
#page-scanner video:not(#overlay-video):not([id^="vid-"]):not([id^="ar-vid-"]) {
  width:100% !important; height:100% !important;
  object-fit:cover !important;
  position:absolute !important; top:0 !important; left:0 !important;
}

.scanner-topbar {
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; align-items:center; justify-content:space-between;
  padding:env(safe-area-inset-top,14px) 16px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.65),transparent);
}
.scanner-logo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--gold); }
.back-btn {
  background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.2);
  color:#fff; border-radius:20px; padding:7px 16px;
  font-size:13px; font-weight:600; cursor:pointer; backdrop-filter:blur(8px);
}

/* Scan frame corners */
.scan-frame {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-55%);
  width:min(70vw,250px); height:min(70vw,250px);
  pointer-events:none; z-index:400;
}
.scan-frame::before,.scan-frame::after,.corner-br,.corner-bl {
  content:''; position:absolute; width:28px; height:28px; border-color:var(--gold); border-style:solid;
}
.scan-frame::before { top:0;left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
.scan-frame::after  { top:0;right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
.corner-br { bottom:0;right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
.corner-bl { bottom:0;left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
.scan-line {
  position:absolute; left:4px; right:4px; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:scanAnim 2s ease-in-out infinite;
  box-shadow:0 0 8px var(--gold);
}
@keyframes scanAnim { 0%,100%{top:4px} 50%{top:calc(100% - 6px)} }

.scan-hint {
  position:fixed; bottom:44px; left:50%; transform:translateX(-50%);
  z-index:400; text-align:center;
  color:rgba(255,255,255,0.72); font-size:13px; pointer-events:none;
  background:rgba(0,0,0,0.5); padding:8px 18px; border-radius:20px;
  backdrop-filter:blur(6px); white-space:nowrap;
}

.dept-badge {
  position:fixed; top:75px; left:50%;
  transform:translateX(-50%) translateY(-8px);
  z-index:500; opacity:0; transition:opacity 0.35s, transform 0.35s;
  pointer-events:none;
  display:flex; align-items:center; gap:10px;
  background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15);
  padding:9px 20px; border-radius:30px; backdrop-filter:blur(10px);
}
.dept-badge.visible { opacity:1; transform:translateX(-50%) translateY(0); }
.dept-badge-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dept-badge-name { font-size:13px; font-weight:600; color:#fff; white-space:nowrap; }

/* Overlay preview card */
.ar-overlay-panel {
  position:fixed; left:50%; bottom:160px;
  transform:translateX(-50%) scale(0.9) translateY(10px);
  z-index:600; width:min(90vw,320px);
  border-radius:14px; overflow:hidden;
  background:#000; box-shadow:0 8px 40px rgba(0,0,0,0.8);
  opacity:0; pointer-events:none;
  transition:opacity 0.4s, transform 0.4s;
  border:1px solid rgba(255,255,255,0.1);
}
.ar-overlay-panel.visible { opacity:1; pointer-events:all; transform:translateX(-50%) scale(1) translateY(0); }
#overlay-video { width:100%; display:block; max-height:130px; object-fit:cover; background:#000; }
.ar-overlay-label {
  padding:7px 14px; font-size:12px; font-weight:600; color:rgba(255,255,255,0.7);
  background:rgba(0,0,0,0.7); display:flex; align-items:center; gap:8px;
}
.ar-live-dot { width:7px;height:7px;border-radius:50%;background:#f5c842; animation:livePulse 1s infinite; }
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Open Video Button */
.open-video-btn {
  position:fixed; bottom:82px; left:50%;
  transform:translateX(-50%) translateY(16px);
  z-index:700; opacity:0; pointer-events:none;
  transition:opacity 0.4s 0.15s, transform 0.4s 0.15s;
  background:linear-gradient(135deg,#f5c842,#f0a500);
  color:#0a0a0f; border:none; border-radius:50px;
  padding:15px 44px;
  font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px;
  cursor:pointer; box-shadow:0 4px 24px rgba(245,200,66,0.5);
}
.open-video-btn.visible { opacity:1; pointer-events:all; transform:translateX(-50%) translateY(0); }
.open-video-btn:active { transform:translateX(-50%) scale(0.95) !important; }

/* ══ VIDEO PLAYER ══ */
#video-player-page {
  background:#000; display:flex; flex-direction:column;
}
.player-header {
  display:flex; align-items:center; gap:14px;
  padding:env(safe-area-inset-top,16px) 16px 14px;
  background:#111; flex-shrink:0;
}
.player-back {
  width:38px; height:38px; border-radius:50%;
  background:rgba(255,255,255,0.1); border:none;
  color:#fff; font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.player-dept-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--gold); }

.main-video-wrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  background:#000; position:relative; overflow:hidden; min-height:0;
}
#main-player { width:100%; height:100%; object-fit:contain; background:#000; display:block; }

.tap-play {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.25); cursor:pointer; z-index:3; transition:opacity 0.3s;
}
.tap-play-icon {
  width:72px; height:72px; border-radius:50%;
  background:rgba(245,200,66,0.92);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; color:#000;
  box-shadow:0 0 30px rgba(245,200,66,0.5);
  transition:transform 0.2s;
}
.tap-play:active .tap-play-icon { transform:scale(0.9); }
.tap-play.hidden { opacity:0; pointer-events:none; }

.player-controls-wrap {
  background:linear-gradient(to top,#0a0a0f,rgba(16,16,22,0.98));
  padding:12px 16px calc(env(safe-area-inset-bottom,10px) + 12px);
  flex-shrink:0;
}
.progress-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.time-label { font-size:11px; color:var(--muted); white-space:nowrap; min-width:38px; }
.time-label.right { text-align:right; }
#prog {
  flex:1; height:4px; -webkit-appearance:none; appearance:none;
  background:rgba(255,255,255,0.18); border-radius:4px; cursor:pointer;
  outline:none;
}
#prog::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  background:var(--gold); box-shadow:0 0 8px rgba(245,200,66,0.5);
}
.ctrl-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.ctrl-icon {
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
  color:#fff; border-radius:50%; width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; cursor:pointer; flex-shrink:0;
  transition:background 0.2s;
}
.ctrl-icon:active { background:rgba(255,255,255,0.2); }
.ctrl-play {
  width:58px; height:58px; font-size:22px;
  background:var(--gold); color:#000; border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(245,200,66,0.4); transition:transform 0.15s;
}
.ctrl-play:active { transform:scale(0.92); }
.speed-pill {
  background:rgba(245,200,66,0.14); border:1px solid rgba(245,200,66,0.3);
  color:var(--gold); border-radius:20px; padding:7px 14px;
  font-size:12px; font-weight:700; cursor:pointer;
}
</style>
</head>
<body>

<!-- Hidden preload videos -->
<video id="vid-it"  src="./it.mp4"  loop muted playsinline preload="auto" webkit-playsinline style="display:none"></video>
<video id="vid-ai"  src="./ai.mp4"  loop muted playsinline preload="auto" webkit-playsinline style="display:none"></video>
<video id="vid-cse" src="./cse.mp4" loop muted playsinline preload="auto" webkit-playsinline style="display:none"></video>
<video id="vid-eee" src="./eee.mp4" loop muted playsinline preload="auto" webkit-playsinline style="display:none"></video>
<video id="vid-ece" src="./ece.mp4" loop muted playsinline preload="auto" webkit-playsinline style="display:none"></video>
<video id="vid-mba" src="./mba.mp4" loop muted playsinline preload="auto" webkit-playsinline style="display:none"></video>

<!-- ════════ PAGE 1: HOME ════════ -->
<div id="page-home" class="page active">
  <div class="home-inner">
    <div class="logo-badge">
      <img src="https://amcet.in/wp-content/uploads/2021/07/amcet-logo.png"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="logo-fallback" style="display:none">AM</div>
    </div>
    <div class="home-title">ANNAI MIRA</div>
    <div class="home-sub">AR ROADMAP</div>
    <div class="tagline">Scan any department logo to explore<br>your career path in Augmented Reality</div>
    <div class="dept-pills">
      <span class="pill pill-it">IT</span>
      <span class="pill pill-ai">AI</span>
      <span class="pill pill-cse">CSE</span>
      <span class="pill pill-eee">EEE</span>
      <span class="pill pill-ece">ECE</span>
      <span class="pill pill-mba">MBA</span>
    </div>
    <button class="start-btn" onclick="goToScanner()">
      <span>▶&nbsp; START SCANNING</span>
    </button>
    <div class="home-footer">
      Annai Mathammal Sheela Engineering College &nbsp;·&nbsp;
      <a href="https://amcet.in" target="_blank">amcet.in</a>
    </div>
  </div>
</div>

<!-- ════════ PAGE 2: SCANNER ════════ -->
<div id="page-scanner" class="page hidden">

  <div class="scanner-topbar">
    <span class="scanner-logo">ANNAI MIRA AR</span>
    <button class="back-btn" onclick="goHome()">✕ Exit</button>
  </div>

  <!-- AR Scene — loaded lazily when goToScanner() is called -->
  <div id="ar-mount"></div>

  <!-- Corner scan frame -->
  <div class="scan-frame">
    <div class="corner-br"></div>
    <div class="corner-bl"></div>
    <div class="scan-line"></div>
  </div>

  <!-- Dept label badge -->
  <div class="dept-badge" id="dept-badge">
    <div class="dept-badge-dot" id="badge-dot"></div>
    <div class="dept-badge-name" id="badge-name"></div>
  </div>

  <!-- Overlay preview video -->
  <div class="ar-overlay-panel" id="overlay-panel">
    <video id="overlay-video" muted playsinline webkit-playsinline loop></video>
    <div class="ar-overlay-label">
      <div class="ar-live-dot"></div>
      <span id="overlay-label">Preview</span>
    </div>
  </div>

  <!-- Open video button -->
  <button class="open-video-btn" id="open-video-btn" onclick="openFullPlayer()">
    ▶&nbsp; OPEN VIDEO
  </button>

  <div class="scan-hint" id="scan-hint">📷 Point at a department logo</div>
</div>

<!-- ════════ PAGE 3: VIDEO PLAYER ════════ -->
<div id="video-player-page" class="page hidden">
  <div class="player-header">
    <button class="player-back" onclick="closeFullPlayer()">‹</button>
    <div class="player-dept-name" id="player-dept-name">Department</div>
  </div>
  <div class="main-video-wrap">
    <video id="main-player" playsinline webkit-playsinline></video>
    <div class="tap-play" id="tap-play" onclick="togglePlay()">
      <div class="tap-play-icon" id="play-icon">▶</div>
    </div>
  </div>
  <div class="player-controls-wrap">
    <div class="progress-row">
      <span class="time-label" id="cur-time">0:00</span>
      <input type="range" id="prog" value="0" min="0" max="100" step="0.1"
        oninput="seekTo(this.value)"
        ontouchstart="isSeeking=true" ontouchend="isSeeking=false"
        onmousedown="isSeeking=true" onmouseup="isSeeking=false">
      <span class="time-label right" id="dur-time">0:00</span>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-icon" onclick="skipBy(-10)">⟪10s</button>
      <button class="ctrl-icon" id="mute-ico" onclick="toggleMute()">🔊</button>
      <button class="ctrl-play" id="ctrl-play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-icon" onclick="skipBy(10)">10s⟫</button>
      <button class="speed-pill" id="speed-pill" onclick="cycleSpeed()">1×</button>
    </div>
  </div>
</div>

<!-- Load MindAR scripts -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script>
const TARGETS = [
  { idx:0, id:"target-it",  srcVid:"vid-it",  name:"Information Technology",           color:"#ff4ecd" },
  { idx:1, id:"target-ai",  srcVid:"vid-ai",  name:"Artificial Intelligence",           color:"#f97316" },
  { idx:2, id:"target-cse", srcVid:"vid-cse", name:"Computer Science Engineering",      color:"#a78bfa" },
  { idx:3, id:"target-eee", srcVid:"vid-eee", name:"Electrical & Electronics Engg",     color:"#10b981" },
  { idx:4, id:"target-ece", srcVid:"vid-ece", name:"Electronics & Communication Engg",  color:"#ef4444" },
  { idx:5, id:"target-mba", srcVid:"vid-mba", name:"Master of Business Administration", color:"#3b82f6" },
];

let currentTarget = null;
let hideTimeout   = null;
let isSeeking     = false;
let isMuted       = false;
let arReady       = false;
const speeds      = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx      = 2;

// ── Page routing ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.classList.add('hidden'); });
  const p = document.getElementById(id);
  p.classList.remove('hidden');
  requestAnimationFrame(() => requestAnimationFrame(() => p.classList.add('active')));
}

function goHome() {
  pauseOverlay();
  showPage('page-home');
}

function goToScanner() {
  showPage('page-scanner');
  if (!arReady) { buildARScene(); arReady = true; }
}

// ── Build AR scene dynamically (prevents iOS/Android from initialising camera on page load) ──
function buildARScene() {
  const mount = document.getElementById('ar-mount');

  // Build asset videos string
  const assetStr = TARGETS.map(t =>
    `<video id="ar-${t.srcVid}" src="./${t.srcVid.replace('vid-','')}.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>`
  ).join('');

  // Build target entities — each shows the video overlaid on the marker
  const entityStr = TARGETS.map(t =>
    `<a-entity mindar-image-target="targetIndex:${t.idx}" id="${t.id}">
       <a-video src="#ar-${t.srcVid}" position="0 0 0.01" width="1.6" height="0.9"
         material="shader:flat;side:double"></a-video>
     </a-entity>`
  ).join('');

  mount.innerHTML = `
    <a-scene
      mindar-image="imageTargetSrc:./targets.mind; filterMinCF:0.0001; filterBeta:0.01;"
      vr-mode-ui="enabled:false"
      device-orientation-permission-ui="enabled:false"
      renderer="alpha:true; antialias:false;"
      embedded
      style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;">
      <a-assets>${assetStr}</a-assets>
      <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
      ${entityStr}
    </a-scene>`;

  // Wait for scene to be ready then attach events
  const scene = mount.querySelector('a-scene');
  scene.addEventListener('loaded', attachAREvents);
}

function attachAREvents() {
  TARGETS.forEach(t => {
    const el = document.getElementById(t.id);
    if (!el) return;

    el.addEventListener('targetFound', () => {
      currentTarget = t;
      clearTimeout(hideTimeout);

      // Badge
      document.getElementById('badge-dot').style.background = t.color;
      document.getElementById('badge-name').textContent = t.name;
      document.getElementById('dept-badge').classList.add('visible');
      document.getElementById('scan-hint').style.display = 'none';

      // AR video
      const arVid = document.getElementById(`ar-${t.srcVid}`);
      if (arVid) { arVid.currentTime = 0; arVid.play().catch(()=>{}); }

      // Overlay preview
      const ov = document.getElementById('overlay-video');
      ov.src = `./${t.srcVid.replace('vid-','')}.mp4`;
      ov.currentTime = 0;
      ov.play().catch(()=>{});
      document.getElementById('overlay-label').textContent = t.name;
      document.getElementById('overlay-panel').classList.add('visible');
      document.getElementById('open-video-btn').classList.add('visible');
    });

    el.addEventListener('targetLost', () => {
      const arVid = document.getElementById(`ar-${t.srcVid}`);
      if (arVid) arVid.pause();
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        if (currentTarget?.id === t.id) {
          document.getElementById('dept-badge').classList.remove('visible');
          document.getElementById('overlay-panel').classList.remove('visible');
          document.getElementById('open-video-btn').classList.remove('visible');
          pauseOverlay();
          document.getElementById('scan-hint').style.display = '';
          currentTarget = null;
        }
      }, 4500);
    });
  });
}

function pauseOverlay() {
  const ov = document.getElementById('overlay-video');
  if (ov) { ov.pause(); ov.src = ''; }
}

// ── Full Video Player ──
function openFullPlayer() {
  if (!currentTarget) return;
  const player = document.getElementById('main-player');
  player.src = `./${currentTarget.srcVid.replace('vid-','')}.mp4`;
  player.muted = false;
  player.playbackRate = speeds[speedIdx];
  document.getElementById('player-dept-name').textContent = currentTarget.name;
  document.getElementById('tap-play').classList.remove('hidden');
  document.getElementById('play-icon').textContent = '▶';
  document.getElementById('ctrl-play-btn').textContent = '▶';
  document.getElementById('prog').value = 0;
  document.getElementById('cur-time').textContent = '0:00';
  document.getElementById('dur-time').textContent = '0:00';
  showPage('video-player-page');

  player.addEventListener('timeupdate', onTimeUpdate);
  player.addEventListener('loadedmetadata', () => {
    document.getElementById('dur-time').textContent = fmtTime(player.duration);
  });
  player.addEventListener('ended', () => {
    document.getElementById('tap-play').classList.remove('hidden');
    document.getElementById('play-icon').textContent = '▶';
    document.getElementById('ctrl-play-btn').textContent = '▶';
  });

  player.play().then(() => {
    document.getElementById('tap-play').classList.add('hidden');
    document.getElementById('play-icon').textContent = '⏸';
    document.getElementById('ctrl-play-btn').textContent = '⏸';
  }).catch(()=>{});
}

function closeFullPlayer() {
  const p = document.getElementById('main-player');
  p.pause(); p.removeEventListener('timeupdate', onTimeUpdate);
  showPage('page-scanner');
}

function togglePlay() {
  const p = document.getElementById('main-player');
  const btn = document.getElementById('ctrl-play-btn');
  const icon = document.getElementById('play-icon');
  const tp = document.getElementById('tap-play');
  if (p.paused) {
    p.play(); btn.textContent='⏸'; icon.textContent='⏸'; tp.classList.add('hidden');
  } else {
    p.pause(); btn.textContent='▶'; icon.textContent='▶'; tp.classList.remove('hidden');
  }
}

function skipBy(sec) {
  const p = document.getElementById('main-player');
  p.currentTime = Math.max(0, Math.min(p.duration||0, p.currentTime + sec));
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('main-player').muted = isMuted;
  document.getElementById('mute-ico').textContent = isMuted ? '🔇' : '🔊';
}

function seekTo(val) {
  const p = document.getElementById('main-player');
  if (p.duration) p.currentTime = (val/100)*p.duration;
}

function cycleSpeed() {
  speedIdx = (speedIdx+1) % speeds.length;
  const s = speeds[speedIdx];
  document.getElementById('main-player').playbackRate = s;
  document.getElementById('speed-pill').textContent = s + '×';
}

function onTimeUpdate() {
  if (isSeeking) return;
  const p = document.getElementById('main-player');
  if (!p.duration) return;
  document.getElementById('prog').value = (p.currentTime/p.duration)*100;
  document.getElementById('cur-time').textContent = fmtTime(p.currentTime);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}

// Prevent iOS scroll bounce
document.body.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
</script>
</body>
