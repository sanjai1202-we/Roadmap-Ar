<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Fix</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="alpha: true">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- PRELOAD VIDEOS -->
  <video id="vid-it" src="./it.mp4" loop muted playsinline></video>
  <video id="vid-ai" src="./ai.mp4" loop muted playsinline></video>
  <video id="vid-cse" src="./cse.mp4" loop muted playsinline></video>
  <video id="vid-eee" src="./eee.mp4" loop muted playsinline></video>
  <video id="vid-ece" src="./ece.mp4" loop muted playsinline></video>
  <video id="vid-mba" src="./mba.mp4" loop muted playsinline></video>

  <!-- IT -->
  <a-entity mindar-image-target="targetIndex:0">
    <a-video src="#vid-it"
      position="0 0 0.1"
      width="1.6"
      height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- AI -->
  <a-entity mindar-image-target="targetIndex:1">
    <a-video src="#vid-ai"
      position="0 0 0.1"
      width="1.6"
      height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- CSE -->
  <a-entity mindar-image-target="targetIndex:2">
    <a-video src="#vid-cse"
      position="0 0 0.1"
      width="1.6"
      height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- EEE -->
  <a-entity mindar-image-target="targetIndex:3">
    <a-video src="#vid-eee"
      position="0 0 0.1"
      width="1.6"
      height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- ECE -->
  <a-entity mindar-image-target="targetIndex:4">
    <a-video src="#vid-ece"
      position="0 0 0.1"
      width="1.6"
      height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- MBA -->
  <a-entity mindar-image-target="targetIndex:5">
    <a-video src="#vid-mba"
      position="0 0 0.1"
      width="1.6"
      height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

</a-scene>

<script>
document.querySelectorAll('[mindar-image-target]').forEach((el, index) => {
  el.addEventListener("targetFound", () => {
    console.log("FOUND TARGET INDEX:", index);
    const video = el.querySelector("video, a-video");
    if (video && video.play) video.play();
  });

  el.addEventListener("targetLost", () => {
    const video = el.querySelector("video, a-video");
    if (video && video.pause) video.pause();
  });
});
</script>

</body>
</html>
