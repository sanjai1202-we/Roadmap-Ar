<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Annai Mira College AR</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw;}

/* ========== HOME PAGE ========== */
#home-page{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#0a0a0f 0%,#1a1020 50%,#0a0a0f 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;
}
.grid-bg{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(212,175,55,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,175,55,0.07) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridMove 8s linear infinite;
}
@keyframes gridMove{0%{background-position:0 0;}100%{background-position:40px 40px;}}
.glow-circle{
  position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.15) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.8;}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}}
.home-content{position:relative;z-index:2;text-align:center;width:100%;}
.college-logo{
  width:110px;height:110px;border-radius:50%;
  border:3px solid #d4af37;
  box-shadow:0 0 30px rgba(212,175,55,0.5);
  margin:0 auto 16px;display:block;object-fit:cover;
}
.college-name{
  font-size:20px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,#d4af37,#ffd700,#d4af37);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.college-sub{font-size:11px;color:rgba(212,175,55,0.7);letter-spacing:1px;margin-bottom:6px;}
.tagline{
  font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;
  font-style:italic;letter-spacing:0.5px;
}
.tagline-en{font-size:12px;color:rgba(212,175,55,0.8);margin-bottom:22px;letter-spacing:0.3px;}
.dept-grid{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px;
}
.dept-pill{
  padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;
  border:1px solid rgba(212,175,55,0.4);
  background:rgba(212,175,55,0.08);color:#d4af37;
}
.start-btn{
  background:linear-gradient(135deg,#d4af37,#ffd700);
  color:#0a0a0f;border:none;padding:16px 48px;border-radius:50px;
  font-size:16px;font-weight:800;letter-spacing:2px;cursor:pointer;
  box-shadow:0 8px 30px rgba(212,175,55,0.5);
  animation:btnGlow 2s ease-in-out infinite;
  width:100%;max-width:280px;
}
@keyframes btnGlow{0%,100%{box-shadow:0 8px 30px rgba(212,175,55,0.5);}50%{box-shadow:0 8px 50px rgba(212,175,55,0.8);}}
.start-btn:active{transform:scale(0.97);}

/* ========== SCANNER PAGE ========== */
#scanner-page{
  position:fixed;inset:0;z-index:100;
  display:none;background:#000;
}
#ar-container{position:absolute;inset:0;}
#ar-container canvas,
#ar-container video{
  width:100%!important;height:100%!important;
  object-fit:cover!important;position:absolute!important;
  top:0!important;left:0!important;
}

/* Scanner UI overlays */
#scanner-ui{
  position:absolute;inset:0;z-index:200;
  pointer-events:none;
}
.scan-frame{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-60%);
  width:240px;height:240px;
}
.corner{position:absolute;width:36px;height:36px;}
.corner-tl{top:0;left:0;border-top:3px solid #d4af37;border-left:3px solid #d4af37;}
.corner-tr{top:0;right:0;border-top:3px solid #d4af37;border-right:3px solid #d4af37;}
.corner-bl{bottom:0;left:0;border-bottom:3px solid #d4af37;border-left:3px solid #d4af37;}
.corner-br{bottom:0;right:0;border-bottom:3px solid #d4af37;border-right:3px solid #d4af37;}
.scan-line{
  position:absolute;left:6px;right:6px;height:2px;top:0;
  background:linear-gradient(90deg,transparent,#d4af37,transparent);
  animation:scanMove 2s linear infinite;
}
@keyframes scanMove{0%{top:0;}100%{top:100%;}}
.scan-hint{
  position:absolute;bottom:calc(50% - 160px);left:50%;transform:translateX(-50%);
  font-size:12px;color:rgba(255,255,255,0.7);letter-spacing:1px;white-space:nowrap;
  background:rgba(0,0,0,0.5);padding:6px 16px;border-radius:20px;
}
#back-to-home{
  position:absolute;top:16px;left:16px;z-index:300;
  background:rgba(0,0,0,0.6);border:1px solid rgba(212,175,55,0.4);
  color:#d4af37;padding:8px 16px;border-radius:24px;font-size:13px;
  cursor:pointer;pointer-events:all;backdrop-filter:blur(4px);
}

/* Detection badge */
#dept-badge{
  position:absolute;bottom:160px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);border:2px solid #d4af37;
  padding:10px 24px;border-radius:30px;text-align:center;
  display:none;pointer-events:none;backdrop-filter:blur(8px);
  z-index:210;
}
#dept-badge .badge-dept{font-size:16px;font-weight:800;color:#d4af37;letter-spacing:2px;}
#dept-badge .badge-sub{font-size:10px;color:rgba(255,255,255,0.6);margin-top:2px;}

/* Open video button */
#open-video-btn{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#d4af37,#ffd700);
  color:#0a0a0f;border:none;padding:14px 40px;border-radius:50px;
  font-size:15px;font-weight:800;letter-spacing:1px;cursor:pointer;
  box-shadow:0 6px 24px rgba(212,175,55,0.6);
  display:none;z-index:210;pointer-events:all;
  animation:btnGlow 1.5s ease-in-out infinite;
}

/* Overlay video preview (plays on top of camera) */
#overlay-video-wrap{
  position:absolute;
  top:50%;left:50%;transform:translate(-50%,-60%);
  width:240px;height:180px;
  border:2px solid #d4af37;border-radius:12px;overflow:hidden;
  display:none;z-index:205;
  box-shadow:0 0 30px rgba(212,175,55,0.4);
}
#overlay-video-wrap video{
  width:100%!important;height:100%!important;
  object-fit:cover!important;position:relative!important;
}

/* ========== FULL VIDEO PLAYER ========== */
#video-player-page{
  position:fixed;inset:0;z-index:9998;
  background:#000;
  display:none;flex-direction:column;
}
#player-header{
  background:linear-gradient(135deg,#0a0a0f,#1a1020);
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(212,175,55,0.3);flex-shrink:0;
  position:relative;z-index:2;
}
#player-back-btn{
  background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.4);
  color:#d4af37;width:38px;height:38px;border-radius:50%;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
#player-dept-name{
  font-size:16px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,#d4af37,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#player-video-wrap{
  flex:1;background:#000;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#main-video{
  width:100%;height:100%;object-fit:contain;display:block;
}
#player-controls{
  background:linear-gradient(135deg,#0a0a0f,#1a1020);
  padding:12px 16px 20px;flex-shrink:0;
  border-top:1px solid rgba(212,175,55,0.3);
}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
#time-current{font-size:11px;color:rgba(255,255,255,0.7);min-width:32px;}
#time-total{font-size:11px;color:rgba(255,255,255,0.7);min-width:32px;text-align:right;}
#seek-bar{
  flex:1;-webkit-appearance:none;height:4px;border-radius:4px;
  background:rgba(255,255,255,0.2);outline:none;cursor:pointer;
}
#seek-bar::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#d4af37;cursor:pointer;
}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:20px;}
.ctrl-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:#fff;border-radius:50%;width:44px;height:44px;
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#play-pause-btn{
  background:linear-gradient(135deg,#d4af37,#ffd700);
  color:#0a0a0f;width:56px;height:56px;font-size:22px;border:none;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.speed-btn{
  background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);
  color:#d4af37;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;
}
</style>
</head>
<body>

<!-- ===== HOME PAGE ===== -->
<div id="home-page">
  <div class="grid-bg"></div>
  <div class="glow-circle"></div>
  <div class="home-content">
    <img id="college-logo" class="college-logo" src="" alt="Annai Mira College"/>
    <div class="college-name">ANNAI MIRA COLLEGE</div>
    <div class="college-sub">OF ENGINEERING & TECHNOLOGY</div>
    <div class="tagline">முயற்சி · பயிற்சி · உழைப்பு</div>
    <div class="tagline-en">Scan any Department logo to explore your Roadmap in AR</div>
    <div class="dept-grid">
      <span class="dept-pill">IT</span>
      <span class="dept-pill">AI & DS</span>
      <span class="dept-pill">CSE</span>
      <span class="dept-pill">EEE</span>
      <span class="dept-pill">ECE</span>
      <span class="dept-pill">MBA</span>
    </div>
    <button class="start-btn" id="start-btn">▶ START SCANNING</button>
  </div>
</div>

<!-- ===== SCANNER PAGE ===== -->
<div id="scanner-page">
  <div id="ar-container"></div>

  <!-- Scanner UI (shown only during scanning) -->
  <div id="scanner-ui">
    <button id="back-to-home">← Home</button>
    <div class="scan-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="scan-hint">Point camera at department logo</div>
    <!-- Overlay video preview -->
    <div id="overlay-video-wrap">
      <video id="overlay-vid" muted playsinline webkit-playsinline preload="auto" loop></video>
    </div>
    <!-- Department badge -->
    <div id="dept-badge">
      <div class="badge-dept" id="badge-dept-name"></div>
      <div class="badge-sub">Department Detected</div>
    </div>
    <!-- Open video button -->
    <button id="open-video-btn">▶ OPEN VIDEO</button>
  </div>
</div>

<!-- ===== FULL VIDEO PLAYER ===== -->
<div id="video-player-page">
  <div id="player-header">
    <button id="player-back-btn">‹</button>
    <div id="player-dept-name">DEPARTMENT</div>
  </div>
  <div id="player-video-wrap">
    <video id="main-video" playsinline webkit-playsinline preload="auto"></video>
  </div>
  <div id="player-controls">
    <div class="progress-wrap">
      <span id="time-current">0:00</span>
      <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1"/>
      <span id="time-total">0:00</span>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="mute-btn">🔊</button>
      <button class="ctrl-btn" id="skip-back-btn">«10s</button>
      <button id="play-pause-btn">▶</button>
      <button class="ctrl-btn" id="skip-fwd-btn">10s»</button>
      <button class="speed-btn" id="speed-btn">1×</button>
    </div>
  </div>
</div>

// ===================== HELPERS =====================
function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  return m + ':' + (ss < 10 ? '0' : '') + ss;
}

function showScannerUI() {
  scannerUI.style.display = 'block';
}

function hideScannerUI() {
  scannerUI.style.display = 'none';
}

// ===================== HOME → SCANNER =====================
document.getElementById('start-btn').addEventListener('click', function() {
  homePage.style.display = 'none';
  scannerPage.style.display = 'block';
  if (!arStarted) {
    arStarted = true;
    initAR();
  }
});

document.getElementById('back-to-home').addEventListener('click', function() {
  stopAllVideos();
  scannerPage.style.display = 'none';
  homePage.style.display = 'flex';
  resetScannerState();
});

// ===================== AR INIT =====================
function initAR() {
  const scene = document.createElement('a-scene');
  scene.setAttribute('mindar-image', 
    'imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.01; missTolerance: 5; warmupTolerance: 3;');
  scene.setAttribute('color-space', 'sRGB');
  scene.setAttribute('renderer', 'colorManagement: true; physicallyCorrectLights: true;');
  scene.setAttribute('vr-mode-ui', 'enabled: false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

  const cam = document.createElement('a-camera');
  cam.setAttribute('position', '0 0 0');
  cam.setAttribute('look-controls', 'enabled: false');
  scene.appendChild(cam);

  DEPTS.forEach(function(dept) {
    const entity = document.createElement('a-entity');
    entity.setAttribute('mindar-image-target', 'targetIndex: ' + dept.index);
    scene.appendChild(entity);

    entity.addEventListener('targetFound', function() {
      onTargetFound(dept);
    });
    entity.addEventListener('targetLost', function() {
      onTargetLost(dept);
    });
  });

  arContainer.appendChild(scene);

  // Fix camera feed CSS after scene loads
  scene.addEventListener('loaded', function() {
    setTimeout(fixCameraCSS, 500);
  });
  setTimeout(fixCameraCSS, 1500);
}

function fixCameraCSS() {
  const vids = arContainer.querySelectorAll('video');
  vids.forEach(function(v) {
    if (v.id !== 'overlay-vid' && v.id !== 'main-video') {
      v.style.cssText = 'width:100%!important;height:100%!important;object-fit:cover!important;position:absolute!important;top:0!important;left:0!important;';
    }
  });
  const canvases = arContainer.querySelectorAll('canvas');
  canvases.forEach(function(c) {
    c.style.cssText = 'width:100%!important;height:100%!important;position:absolute!important;top:0!important;left:0!important;';
  });
}

// ===================== TARGET FOUND =====================
function onTargetFound(dept) {
  currentDept = dept;
  clearTimeout(hideOverlayTimer);
  clearTimeout(hideButtonTimer);

  // Show badge
  badgeDeptName.textContent = dept.name;
  deptBadge.style.display = 'block';

  // Show overlay video preview
  overlayVid.src = dept.src;
  overlayVid.muted = true;
  overlayWrap.style.display = 'block';
  overlayVid.load();
  overlayVid.play().catch(function(){});

  // Show Open Video button
  openVideoBtn.style.display = 'block';
}

// ===================== TARGET LOST =====================
function onTargetLost(dept) {
  // Keep overlay and button visible for 3 seconds after losing target
  hideOverlayTimer = setTimeout(function() {
    overlayWrap.style.display = 'none';
    overlayVid.pause();
    overlayVid.src = '';
  }, 3000);

  hideButtonTimer = setTimeout(function() {
    openVideoBtn.style.display = 'none';
    deptBadge.style.display = 'none';
  }, 4000);
}

// ===================== OPEN FULL VIDEO PLAYER =====================
openVideoBtn.addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  if (!currentDept) return;
  openFullPlayer(currentDept);
});

function openFullPlayer(dept) {
  // CRITICAL: Hide ALL scanner UI elements completely
  hideScannerUI();
  scannerPage.style.zIndex = '1'; // push scanner behind

  // Show video player page on top
  playerPage.style.display = 'flex';
  playerPage.style.zIndex = '9998';

  // Set department name
  playerDeptName.textContent = dept.name;

  // Load and play video
  mainVideo.src = dept.src;
  mainVideo.muted = false;
  mainVideo.load();
  mainVideo.play().catch(function(err) {
    console.log('Autoplay blocked, user must tap play:', err);
  });
}

// ===================== BACK BUTTON (Video → Scanner) =====================
document.getElementById('player-back-btn').addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  closeFullPlayer();
}, true); // capture phase — fires before anything else

function closeFullPlayer() {
  // Stop and clear main video
  mainVideo.pause();
  mainVideo.src = '';
  mainVideo.load();

  // Hide player
  playerPage.style.display = 'none';
  playerPage.style.zIndex = '9998';

  // Restore scanner
  scannerPage.style.zIndex = '100';
  showScannerUI();

  // Reset state
  currentDept = null;
  openVideoBtn.style.display = 'none';
  deptBadge.style.display = 'none';
  overlayWrap.style.display = 'none';
  overlayVid.pause();
  overlayVid.src = '';

  // Reset player controls
  playPauseBtn.textContent = '▶';
  seekBar.value = 0;
  timeCurrent.textContent = '0:00';
  timeTotal.textContent = '0:00';
}

// ===================== VIDEO CONTROLS =====================
mainVideo.addEventListener('loadedmetadata', function() {
  timeTotal.textContent = fmtTime(mainVideo.duration);
  seekBar.max = mainVideo.duration;
});

mainVideo.addEventListener('timeupdate', function() {
  if (!mainVideo.duration) return;
  seekBar.value = mainVideo.currentTime;
  timeCurrent.textContent = fmtTime(mainVideo.currentTime);
});

mainVideo.addEventListener('play', function() { playPauseBtn.textContent = '⏸'; });
mainVideo.addEventListener('pause', function() { playPauseBtn.textContent = '▶'; });
mainVideo.addEventListener('ended', function() { playPauseBtn.textContent = '▶'; });

playPauseBtn.addEventListener('click', function() {
  if (mainVideo.paused) { mainVideo.play(); }
  else { mainVideo.pause(); }
});

seekBar.addEventListener('input', function() {
  mainVideo.currentTime = parseFloat(seekBar.value);
});

document.getElementById('skip-back-btn').addEventListener('click', function() {
  mainVideo.currentTime = Math.max(0, mainVideo.currentTime - 10);
});

document.getElementById('skip-fwd-btn').addEventListener('click', function() {
  mainVideo.currentTime = Math.min(mainVideo.duration || 0, mainVideo.currentTime + 10);
});

muteBtn.addEventListener('click', function() {
  mainVideo.muted = !mainVideo.muted;
  muteBtn.textContent = mainVideo.muted ? '🔇' : '🔊';
});

const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 2;
speedBtn.addEventListener('click', function() {
  speedIdx = (speedIdx + 1) % speeds.length;
  mainVideo.playbackRate = speeds[speedIdx];
  speedBtn.textContent = speeds[speedIdx] + '×';
});

// ===================== UTILITIES =====================
function stopAllVideos() {
  overlayVid.pause(); overlayVid.src = '';
  mainVideo.pause(); mainVideo.src = '';
}

function resetScannerState() {
  currentDept = null;
  openVideoBtn.style.display = 'none';
  deptBadge.style.display = 'none';
  overlayWrap.style.display = 'none';
  playerPage.style.display = 'none';
  scannerPage.style.zIndex = '100';
  playPauseBtn.textContent = '▶';
  seekBar.value = 0;
  timeCurrent.textContent = '0:00';
  timeTotal.textContent = '0:00';
}

// Prevent iOS bounce scroll
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
</script>
</body>
</html>
