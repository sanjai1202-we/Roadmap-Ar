<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Annai Mira AR Roadmap</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<!-- 
  VIDEOS MUST BE OUTSIDE <a-scene> for reliable mobile autoplay.
  Each video has: muted + playsinline + preload="auto"
  These are REQUIRED for autoplay to work on iOS and Android.
-->
<video id="vid-it"  src="./it.mp4"  loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-ai"  src="./ai.mp4"  loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-cse" src="./cse.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-eee" src="./eee.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-ece" src="./ece.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>
<video id="vid-mba" src="./mba.mp4" loop muted playsinline preload="auto" webkit-playsinline></video>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="alpha: true">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- IT — targetIndex: 0 -->
  <a-entity mindar-image-target="targetIndex: 0" id="target-it">
    <a-video src="#vid-it" position="0 0 0.1" width="1.6" height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- AI — targetIndex: 1 -->
  <a-entity mindar-image-target="targetIndex: 1" id="target-ai">
    <a-video src="#vid-ai" position="0 0 0.1" width="1.6" height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- CSE — targetIndex: 2 -->
  <a-entity mindar-image-target="targetIndex: 2" id="target-cse">
    <a-video src="#vid-cse" position="0 0 0.1" width="1.6" height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- EEE — targetIndex: 3 -->
  <a-entity mindar-image-target="targetIndex: 3" id="target-eee">
    <a-video src="#vid-eee" position="0 0 0.1" width="1.6" height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- ECE — targetIndex: 4 -->
  <a-entity mindar-image-target="targetIndex: 4" id="target-ece">
    <a-video src="#vid-ece" position="0 0 0.1" width="1.6" height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

  <!-- MBA — targetIndex: 5 -->
  <a-entity mindar-image-target="targetIndex: 5" id="target-mba">
    <a-video src="#vid-mba" position="0 0 0.1" width="1.6" height="0.9"
      material="shader: flat; side: double">
    </a-video>
  </a-entity>

</a-scene>

<script>
  /*
   * FIX: Map each target entity to the correct <video> DOM element by ID.
   * We use document.getElementById() — NOT el.querySelector() — because
   * the <video> tags are outside the <a-scene>, so querySelector inside
   * the entity will NEVER find them (that was the black screen bug).
   */
  const targetVideoMap = {
    "target-it":  "vid-it",
    "target-ai":  "vid-ai",
    "target-cse": "vid-cse",
    "target-eee": "vid-eee",
    "target-ece": "vid-ece",
    "target-mba": "vid-mba"
  };

  Object.entries(targetVideoMap).forEach(([targetId, videoId]) => {
    const targetEl = document.getElementById(targetId);
    const videoEl  = document.getElementById(videoId);

    if (!targetEl || !videoEl) {
      console.warn("Missing element:", targetId, videoId);
      return;
    }

    targetEl.addEventListener("targetFound", () => {
      console.log("Target found:", targetId);
      // Reset to start for clean playback
      videoEl.currentTime = 0;
      // .play() returns a Promise — catch errors silently
      videoEl.play().catch(err => console.warn("Play failed:", err));
    });

    targetEl.addEventListener("targetLost", () => {
      console.log("Target lost:", targetId);
      videoEl.pause();
    });
  });
</script>

</body>
</html>
